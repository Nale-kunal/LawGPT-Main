# ─────────────────────────────────────────────────────────────────────────────
# Juriq — NGINX Reverse Proxy Configuration
# For self-hosted VPS (Render / Railway manage TLS automatically — skip this file)
#
# Setup steps:
#   1. Install Certbot: sudo apt install certbot python3-certbot-nginx
#   2. Issue certificate: sudo certbot --nginx -d juriq.app -d api.juriq.app
#   3. Copy this file to /etc/nginx/sites-available/juriq.conf
#   4. sudo ln -s /etc/nginx/sites-available/juriq.conf /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS redirect (all domains)
server {
    listen 80;
    listen [::]:80;
    server_name juriq.app api.juriq.app;
    return 301 https://$host$request_uri;
}

# API backend (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.juriq.app;

    # TLS (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.juriq.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.juriq.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (also enforced by the Express Helmet middleware)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Proxy to Express
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        client_max_body_size 5m;
    }

    # Block access to .env files via NGINX (belt-and-suspenders)
    location ~ /\.env {
        deny all;
        return 404;
    }
}

# Frontend (HTTPS) — served from Vercel/CDN, but keep redirect if needed
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name juriq.app;

    ssl_certificate     /etc/letsencrypt/live/juriq.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/juriq.app/privkey.pem;

    # If frontend is served from same VPS, proxy to Vite/static build:
    # location / { proxy_pass http://127.0.0.1:8080; }

    # Otherwise redirect to CDN/Vercel domain:
    return 301 https://juriq.vercel.app$request_uri;
}
