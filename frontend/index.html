<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Juriq – AI Powered Legal Case Management</title>
    <meta name="description" content="Professional legal case management software for Indian law firms. Manage cases, track hearings, collaborate with clients, and organize legal strategy in one powerful workspace." />
    <meta name="keywords" content="legal case management, law firm software, Indian legal software, court calendar, legal AI" />
    <meta name="author" content="Juriq" />

    <!-- Synchronous Theme Sync (Prevents Flash) -->
    <!-- Synchronous Boot Controls (Theme Sync + Auth Guard) -->
    <script>
      (function() {
        // 1. Theme Sync (Prevents Flash)
        var sk = 'legal-pro-theme';
        var t = localStorage.getItem(sk) || 'system';
        var r = document.documentElement;
        var d = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) r.classList.add('dark'); else r.classList.add('light');

        // 2. Auth Guard (BFCache / Sync Redirect)
        var p = window.location.pathname;
        var i = p === '/login' || p === '/signup' || p === '/forgot-password' || p === '/reset-password' || p === '/';
        if (i && document.cookie.indexOf('is_authenticated=true') !== -1) {
          window.location.replace('/dashboard');
        }
      })();
    </script>

    <link rel="icon" href="/logo.png" />

    <meta property="og:title" content="Juriq – AI Powered Legal Case Management" />
    <meta property="og:description" content="Professional legal case management software for Indian law firms." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Juriq – AI Powered Legal Case Management" />
    <meta name="twitter:description" content="Professional legal case management software for Indian law firms." />
  </head>

  <body>
    <div id="root">
      <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        html.dark .initial-loader { --p: #ffffff; --bg: #09090b; --txt: #a1a1aa; }
        html.light .initial-loader { --p: #09090b; --bg: #ffffff; --txt: #71717a; }
        
        .initial-loader {
          position: fixed; inset: 0;
          background: var(--bg);
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          z-index: 9999; font-family: 'Inter', sans-serif;
          height: 100dvh; width: 100vw;
        }
        .pulse-container { position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .pulse-ring {
          position: absolute; inset: 0;
          border: 3px solid rgba(161, 161, 170, 0.1);
          border-top: 3px solid var(--p);
          border-radius: 50%;
          animation: spin 1.5s linear infinite;
        }
        .pulse-icon {
          position: absolute; inset: 0;
          display: flex; align-items: center; justify-content: center;
          animation: pulse 1.5s ease-in-out infinite;
          color: var(--p);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
        .loader-text {
          position: absolute; top: 100%; margin-top: 24px;
          color: var(--txt); font-size: 10px; white-space: nowrap;
          font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
          animation: text-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes text-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
      </style>
      <div class="initial-loader">
        <div class="pulse-container">
          <div class="pulse-ring"></div>
          <div class="pulse-icon">
            <img src="/logo.png" alt="Juriq Logo" style="width: 32px; height: 32px; object-fit: contain;" />
          </div>
          <div class="loader-text">Initializing Juriq</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
